name: Spain Appointment Checker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  spain-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager requests

      - name: Run Spain Script
        run: python spain.py
